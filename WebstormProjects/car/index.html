<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>赛车游戏</title>
  <style>
    /* 全局重置 */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a0a;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #ffffff;
    }

    /* 全屏 Canvas 容器 */
    #gameContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
    }

    /* 加载中提示（在 JS 接管前显示） */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #ffffff;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      z-index: 100;
      transition: opacity 0.3s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <span>加载中...</span>
  </div>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
