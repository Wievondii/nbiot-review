<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>3D 赛车游戏</title>
  <style>
    /* 全局重置 */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a0a;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #ffffff;
    }

    /* 全屏 Canvas 容器 */
    #gameContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 加载中提示（在 JS 接管前显示） */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #ffffff;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      z-index: 100;
      transition: opacity 0.3s ease;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      margin-right: 16px;
      border: 3px solid #333;
      border-top-color: #ff4444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* 错误提示（默认隐藏，JS 在出错时显示） */
    #error {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #1a0000;
      color: #ff6b6b;
      font-size: 1.1rem;
      text-align: center;
      padding: 30px;
      z-index: 200;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>加载中...</span>
  </div>
  <div id="error"></div>
  <div id="gameContainer"></div>

  <!-- ES Module Import Map（映射 three 和 cannon-es 到 jsdelivr CDN） -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>

  <!-- 主入口 -->
  <script type="module" src="main.js"></script>
</body>
</html>
